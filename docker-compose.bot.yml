services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: cashflow-bot
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - LLM_OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
